project:
  title: "Factory Automation · Precision in Motion"
  brief: >
    A brand-style video built entirely from factory automation footage,
    emphasizing reliability, precision, and system-level thinking.

creative:
  target_length_seconds: 40
  pacing: steady_to_confident
  visual_language: industrial, clean, systematic

script:
  language: auto

  scenes:

    - id: s1
      purpose: opening_establish
      footage_hint:
        source: factory_building
        shot_type: wide
      visual_description: >
        Exterior view of the factory building. Calm, stable, grounded.
      vo:
        text: >
          Every reliable system begins with a strong foundation.
      subtitle:
        text: "Every reliable system starts with a foundation."

    - id: s2
      purpose: process_overview
      footage_hint:
        source: factory_line
        shot_type: wide
      visual_description: >
        Wide shots of the production line operating continuously.
      vo:
        text: >
          Inside, countless processes move in sync, each with a clear role.
      subtitle:
        text: "Inside, every process has a role."

    - id: s3
      purpose: precision_focus
      footage_hint:
        source: factory_line
        shot_type: medium
      visual_description: >
        Medium shots showing machines interacting with materials.
      vo:
        text: >
          Precision is built through structure, not chance.
      subtitle:
        text: "Precision comes from structure."

    - id: s4
      purpose: automation_detail
      footage_hint:
        source: factory_automation
        shot_type: close
      visual_description: >
        Close-up shots of automated components, robotic movement, sensors.
      vo:
        text: >
          Automation turns complexity into repeatable execution.
      subtitle:
        text: "Automation makes complexity repeatable."

    - id: s5
      purpose: quality_control
      footage_hint:
        source: factory_testing
        shot_type: medium
      visual_description: >
        Testing procedures, inspection machines, validation steps.
      vo:
        text: >
          Quality is maintained by systems that never stop checking.
      subtitle:
        text: "Quality is built into the system."

    - id: s6
      purpose: reliability_closeup
      footage_hint:
        source: factory_testing
        shot_type: close
      visual_description: >
        Close-up details of measurements, indicators, or inspection results.
      vo:
        text: >
          Consistency is what turns motion into trust.
      subtitle:
        text: "Consistency builds trust."

    - id: s7
      purpose: system_flow
      footage_hint:
        source: factory_automation
        shot_type: wide
      visual_description: >
        Wider automation shots showing multiple systems operating together.
      vo:
        text: >
          When every part is connected, progress becomes predictable.
      subtitle:
        text: "Connected systems drive predictable progress."

    - id: s8
      purpose: closing_brand
      footage_hint:
        source: factory_building
        shot_type: wide
      visual_description: >
        Return to the factory exterior or a calm wide interior shot.
      vo:
        text: >
          Built on structure. Driven by precision.
      subtitle:
        text: "Built on structure. Driven by precision."