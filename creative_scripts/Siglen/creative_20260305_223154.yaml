project:
  title: "Factory Automation · Precision in Motion"

creative:
  tone: industrial, confident
  target_length_seconds: 40

beats:
  - id: b1
    purpose: opening_establish
    coverage: [wide]
    visual_description: Factory building exterior, stable and calm.
    vo_text: >
      Every reliable system begins with a strong foundation.
    subtitle_text: >
      Every reliable system starts with a foundation.

  - id: b2
    purpose: process_overview
    coverage: [wide]
    visual_description: Wide view of the production line in operation.
    vo_text: >
      Inside, countless processes move in sync, each with a clear role.
    subtitle_text: >
      Inside, every process has a role.

  - id: b3
    purpose: precision_focus
    coverage: [medium]
    visual_description: Machines interacting with materials on the line.
    vo_text: >
      Precision is built through structure, not chance.
    subtitle_text: >
      Precision comes from structure.

  - id: b4
    purpose: automation_detail
    coverage: [close]
    visual_description: Close-ups of robotic arms, sensors, automation components.
    vo_text: >
      Automation turns complexity into repeatable execution.
    subtitle_text: >
      Automation makes complexity repeatable.

  - id: b5
    purpose: quality_control
    coverage: [medium]
    visual_description: Testing and inspection machines validating output.
    vo_text: >
      Quality is maintained by systems that never stop checking.
    subtitle_text: >
      Quality is built into the system.

  - id: b6
    purpose: reliability_detail
    coverage: [close]
    visual_description: Measurement displays and inspection indicators.
    vo_text: >
      Consistency is what turns motion into trust.
    subtitle_text: >
      Consistency builds trust.

  - id: b7
    purpose: system_flow
    coverage: [wide]
    visual_description: Multiple automated systems working together.
    vo_text: >
      When every part is connected, progress becomes predictable.
    subtitle_text: >
      Connected systems drive predictable progress.

  - id: b8
    purpose: closing_brand
    coverage: [wide]
    visual_description: Return to factory exterior or calm interior wide shot.
    vo_text: >
      Built on structure. Driven by precision.
    subtitle_text: >
      Built on structure. Driven by precision.