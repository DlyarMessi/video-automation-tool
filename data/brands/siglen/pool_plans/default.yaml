brand: Siglen
topics:
- name: Factory Strength
  slots:
  - scene: factory
    content: building
    coverage: wide
    move: static
    registry_key: factory.building.wide.static
    target: 8
    priority: high
    human_label: Factory exterior wide establishing shot
    shoot_brief: Capture a stable wide shot that clearly shows the factory building,
      scale, and surrounding context.
    success_criteria:
    - The full building or main facade is clearly visible
    - The shot feels stable and usable as an opening context shot
    - Brand or facility identity is readable if available
    fallback:
    - Use a slightly tighter static exterior if the full facade cannot be captured
      cleanly
    - Use a higher or more diagonal angle if it still clearly communicates factory
      scale
    purpose: Establish context and show factory scale
    defaults:
      energy: medium
      quality_status: approved
      continuity_group: factory_building
      intro_safe: true
      hero_safe: false
      outro_safe: false
  - scene: factory
    content: building
    coverage: hero
    move: orbit
    registry_key: factory.building.hero.orbit
    target: 6
    priority: high
    human_label: Factory hero orbit shot
    shoot_brief: Capture a premium-looking orbit or curved movement around the factory
      exterior for brand-level usage.
    success_criteria:
    - The movement feels smooth and intentional
    - The building remains the clear hero subject
    - The shot feels premium enough for key brand moments or closing use
    fallback:
    - Use a slow diagonal reveal if a full orbit is not practical
    - Use a controlled push or side move that still feels cinematic and brand-led
    purpose: Create a premium brand-scale hero image
    defaults:
      energy: medium
      quality_status: approved
      continuity_group: factory_building
      intro_safe: false
      hero_safe: true
      outro_safe: true
  - scene: factory
    content: automation
    coverage: wide
    move: static
    registry_key: factory.automation.wide.static
    target: 10
    priority: high
    human_label: Automation line wide shot
    shoot_brief: Capture a stable wide shot that clearly shows the automated production
      area, machines, and workflow context.
    success_criteria:
    - The automation area is clearly recognizable
    - The frame shows enough space to understand the production setup
    - The shot feels stable and usable as a capability overview
    fallback:
    - Use a slightly tighter static angle if the full line cannot be framed cleanly
    - Use another wide automation area if it still communicates scale and automation
      clearly
    purpose: Show manufacturing capability and automation scale
    defaults:
      energy: medium
      quality_status: approved
      continuity_group: factory_automation
      intro_safe: true
      hero_safe: false
      outro_safe: false
  - scene: factory
    content: automation
    coverage: medium
    move: slide
    registry_key: factory.automation.medium.slide
    target: 10
    priority: high
    human_label: Automation medium slide shot
    shoot_brief: Capture a smooth side movement across the automated production area
      with one main machine or process clearly readable.
    success_criteria:
    - The movement feels controlled and smooth
    - One main automation subject remains readable throughout the shot
    - The shot feels more dynamic than a static overview
    fallback:
    - Use a shorter controlled side move if space is limited
    - Use a slow push or alternate side angle if sliding is not practical
    purpose: Show automation capability with more dynamic motion
    defaults:
      energy: medium
      quality_status: approved
      continuity_group: factory_automation
      intro_safe: false
      hero_safe: false
      outro_safe: false
  - scene: factory
    content: automation
    coverage: detail
    move: static
    registry_key: factory.automation.detail.static
    target: 12
    priority: high
    human_label: Automation process detail
    shoot_brief: Capture a stable close detail of automated machinery, robotic movement,
      or a precise production process.
    success_criteria:
    - The detail clearly feels automated rather than generic factory footage
    - The frame is tight enough to show precision
    - The shot is stable and visually clean
    fallback:
    - Use another machine detail if the original process is inaccessible
    - Use a different robotic or mechanical close detail if it still clearly signals
      automation
    purpose: Provide precise visual proof of automated production
    defaults:
      energy: high
      quality_status: approved
      continuity_group: factory_automation
      intro_safe: false
      hero_safe: false
      outro_safe: false
- name: Quality & Safety
  slots:
  - scene: tower
    content: testing
    coverage: medium
    move: static
    registry_key: tower.testing.medium.static
    target: 8
    priority: high
    human_label: Test tower operation medium shot
    shoot_brief: Capture a stable medium shot that clearly shows elevator testing
      activity happening in the tower area.
    success_criteria:
    - Testing activity is visually understandable without extra explanation
    - The frame includes enough surrounding context to identify the area as a testing
      environment
    - The shot is stable and readable for trust-building use
    fallback:
    - Use a slightly wider static shot if medium framing cannot explain the testing
      clearly
    - Use a different tower testing angle if it still proves active testing behavior
    purpose: Build trust by showing real testing in progress
    defaults:
      energy: medium
      quality_status: approved
      continuity_group: tower_testing
      intro_safe: false
      hero_safe: false
      outro_safe: false
  - scene: tower
    content: testing
    coverage: detail
    move: static
    registry_key: tower.testing.detail.static
    target: 10
    priority: high
    human_label: Test tower proof detail
    shoot_brief: Capture a stable detail that acts as proof of testing, such as movement,
      indicators, machinery, or a testing interface.
    success_criteria:
    - The detail clearly supports the claim that testing is actively happening
    - The frame is tight enough to feel precise and technical
    - The shot remains stable and visually clean
    fallback:
    - Use another tower testing detail if the original detail is not accessible
    - Capture a different close proof point such as panel readout, movement interface,
      or mechanical testing detail
    purpose: Provide precise visual proof of quality testing
    defaults:
      energy: medium
      quality_status: approved
      continuity_group: tower_testing
      intro_safe: false
      hero_safe: false
      outro_safe: false
  - scene: tower
    content: panel
    coverage: detail
    move: static
    registry_key: tower.panel.detail.static
    target: 8
    priority: medium
    human_label: Tower control panel detail
    shoot_brief: Capture a close stable detail of the tower-side control panel, screen,
      buttons, or instrumentation used in testing.
    success_criteria:
    - The panel or interface is the clear main subject
    - Important indicators, screens, or controls are readable or visually meaningful
    - The shot feels technical and controlled rather than random
    fallback:
    - Use another nearby test interface if the exact panel is inaccessible
    - Capture a different instrument detail if it still clearly supports the testing
      workflow
    purpose: Support the quality and testing narrative with technical detail
    defaults:
      energy: low
      quality_status: approved
      continuity_group: tower_testing
      intro_safe: false
      hero_safe: false
      outro_safe: false
  - scene: factory
    content: inspection
    coverage: detail
    move: static
    registry_key: factory.inspection.detail.static
    target: 8
    priority: medium
    human_label: Inspection detail shot
    shoot_brief: Capture a clear close detail of manual or visual inspection work,
      showing checking, reviewing, or confirming product quality.
    success_criteria:
    - Inspection activity is obvious from the frame
    - The detail feels precise rather than generic factory footage
    - The shot can support a quality-control message without extra explanation
    fallback:
    - Use another close inspection action if the original check point is unavailable
    - Use a different operator quality-check detail if it still clearly signals inspection
      work
    purpose: Show quality control and manual verification
    defaults:
      energy: low
      quality_status: approved
      continuity_group: factory_testing
      intro_safe: false
      hero_safe: false
      outro_safe: false
