version: 1
status: seeded-from-siglen-v1
about:
  purpose: 'Initial placeholder for the governed canonical registry. This file will
    later become the single source of truth for canonical shot entries.

    '
principles:
- strict canonical core
- rich registry direction
- policy before expansion
- incremental migration
- no namespace-heavy content in v1
governed_fields:
- scene
- content
- coverage
- move
notes:
- 'v1 placeholder only. Existing pool plans and runtime logic are not yet rewritten
  to consume this file directly.

  '
- 'Future registry entries may attach canonical fields, user-facing metadata, and
  editorial purpose metadata to one slot identity.

  '
entries:
  factory.automation.detail.static:
    status: active
    canonical:
      scene: factory
      content: automation
      coverage: detail
      move: static
    public:
      human_label: Automation process detail
      shoot_brief: Capture a stable close detail of automated machinery, robotic movement,
        or a precise production process.
      success_criteria:
      - The detail clearly feels automated rather than generic factory footage
      - The frame is tight enough to show precision
      - The shot is stable and visually clean
      fallback:
      - Use another machine detail if the original process is inaccessible
      - Use a different robotic or mechanical close detail if it still clearly signals
        automation
    story:
      purpose_text: Provide precise visual proof of automated production
    operational:
      defaults:
        energy: high
        quality_status: approved
        continuity_group: factory_automation
        intro_safe: false
        hero_safe: false
        outro_safe: false
      source_examples:
      - brand: siglen
        plan: default
        topic: Factory Strength
        target: 12
        priority: high
